<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width,initial-scale=1" />
        <title>Sign up form</title>
        <link rel="stylesheet" href="https://pyscript.net/releases/2026.3.1/core.css" />
        <script type="module" src="https://pyscript.net/releases/2026.3.1/core.js"></script>
    <style>
        body {
            background-color: #a4bfd3;
            font-family: Arial;
            text-align: center;
        }

        .box {
            background-color: white;
            width: 300px;
            margin: auto;
            padding: 20px;
            border-radius: 10px;
            margin: auto;
        }

        button {
            background-color: #a1bfd8;
            border: none;
            padding: 8px;
            width: 100%;
        }
    </style>
</head>

<body>

<div class="box">
    <h2>Sign Up</h2>

    <p>Full Name</p>
    <input type="text" id="fullname">

    <p>Username</p>
    <input type="text" id="username">

    <p>Password</p>
    <input type="password" id="password">

    <br><br>
    <button onclick="validate()">Create Account</button>

    <p id="message"></p>
</div>

<script>
function validate() {
    let name = document.getElementById("fullname").value;
    let user = document.getElementById("username").value;
    let pass = document.getElementById("password").value;
    let msg = document.getElementById("message");

    let firstChar = name.charAt(0);
    if (firstChar !== firstChar.toUpperCase()) {
        msg.innerHTML = "❌ Full name must be Title Case";
        return;
    }

    // USERNAME CHECK
    if (user.length < 7) {
        msg.innerHTML = "❌ Username must be at least 7 characters";
        return;
    }

    // PASSWORD CHECK (simple IF-ELSE only)
    let hasLetter = /[a-zA-Z]/.test(pass);
    let hasNumber = /[0-9]/.test(pass);

    if (pass.length < 10) {
        msg.innerHTML = "❌ Password must be at least 10 characters";
        return;
    } else if (!hasLetter) {
        msg.innerHTML = "❌ Password must contain letters";
        return;
    } else if (!hasNumber) {
        msg.innerHTML = "❌ Password must contain numbers";
        return;
    }

    msg.innerHTML = " Yay! account created successfully!";
}
</script>
